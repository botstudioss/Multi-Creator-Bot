version: '3.8'

services:
  pollmasterbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pollmasterbot
    restart: unless-stopped
    environment:
      # Required
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      POLLING_CHANNEL_ID: ${POLLING_CHANNEL_ID}
      
      # Optional
      ADMIN_IDS: ${ADMIN_IDS:-}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      NODE_ENV: production
      LOG_LEVEL: info
      
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
      # Mount config files (optional, for easier updates)
      - ./bots.json:/app/bots.json:ro
      - ./mcp-servers.json:/app/mcp-servers.json:ro
      - ./.env:/app/.env:ro
    
    ports:
      # API Server
      - "3000:3000"
    
    depends_on:
      postgres:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    
    networks:
      - pollmasterbot-net

  # PostgreSQL database for persistent state
  postgres:
    image: postgres:15-alpine
    container_name: pollmasterbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pollmaster}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-pollmasterbot}
    
    volumes:
      # Database persistence
      - postgres_data:/var/lib/postgresql/data
    
    ports:
      # Expose for backups/debugging only
      - "5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pollmaster}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    networks:
      - pollmasterbot-net
    
    # Uncomment for production to add PostgreSQL backup
    # command:
    #   - "postgres"
    #   - "-c"
    #   - "max_connections=200"
    #   - "-c"
    #   - "shared_buffers=256MB"

volumes:
  postgres_data:
    driver: local

networks:
  pollmasterbot-net:
    driver: bridge
